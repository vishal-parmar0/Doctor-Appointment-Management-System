<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - MediBook</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary: #1A1A2E;
            --primary-light: #16213E;
            --accent: #E94560;
            --success: #10B981;
            --error: #EF4444;
            --white: #FFFFFF;
            --light-bg: #F8FAFF;
            --radius: 16px;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--primary);
            color: var(--white);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .admin-card {
            background: var(--primary-light);
            padding: 50px 40px;
            border-radius: var(--radius);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-header i {
            font-size: 50px;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .admin-header h3 {
            font-weight: 700;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 8px;
            display: block;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #555;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            padding: 12px 15px 12px 45px;
            border-radius: 12px;
            height: 52px;
        }

        .form-control:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 4px rgba(233, 69, 96, 0.2) !important;
        }

        .btn-admin {
            background: var(--accent);
            color: white;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            margin-top: 10px;
            transition: var(--transition);
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(233, 69, 96, 0.4);
        }

        /* Flash Message Helper */
        #flash-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1100;
            width: 90%;
            max-width: 400px;
        }

        .flash-msg {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 10px;
            color: var(--white);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .flash-error {
            background-color: var(--error);
        }

        .flash-success {
            background-color: var(--success);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #777;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            color: var(--accent);
        }
    </style>
</head>

<body>
    <div id="flash-container"></div>

    <div class="admin-card" data-aos="zoom-in">
        <div class="admin-header text-center">
            <i class="fa-solid fa-user-shield"></i>
            <h3>Master Admin</h3>
            <p class="text-muted small">MediBook Governance Portal</p>
        </div>

        <form id="admin-login-form">
            <div class="form-group">
                <label class="form-label">Admin Identity</label>
                <div class="input-group">
                    <i class="fa-solid fa-id-badge"></i>
                    <input type="email" id="email" class="form-control" placeholder="admin@medibook.com" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Access Key</label>
                <div class="input-group">
                    <i class="fa-solid fa-key"></i>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-admin" id="submit-btn">Authorize Access</button>
            <a href="../index.html" class="back-link"><i class="fa-solid fa-arrow-left me-1"></i> Public Site</a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        AOS.init({ duration: 800 });

        function showFlash(message, type = 'success') {
            const container = document.getElementById('flash-container');
            const flash = document.createElement('div');
            flash.className = `flash-msg flash-${type}`;
            flash.innerHTML = `<span>${message}</span>`;
            container.appendChild(flash);
            setTimeout(() => {
                flash.style.opacity = '0';
                setTimeout(() => flash.remove(), 300);
            }, 3000);
        }

        document.getElementById('admin-login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Authenticating...';
            btn.disabled = true;

            fetch('http://localhost:5000/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            })
                .then(res => res.json().then(data => ({ status: res.status, body: data })))
                .then(obj => {
                    if (obj.status === 200 && obj.body.user.role === 'admin') {
                        showFlash('Identity Verified. Welcome Master.', 'success');
                        sessionStorage.setItem('token', obj.body.token);
                        sessionStorage.setItem('user', JSON.stringify(obj.body.user));
                        setTimeout(() => window.location.href = '../admin-dashboard.html', 1000);
                    } else {
                        btn.innerHTML = 'Authorize Access';
                        btn.disabled = false;
                        showFlash(obj.body.error || 'Access Denied', 'error');
                    }
                })
                .catch(err => {
                    btn.innerHTML = 'Authorize Access';
                    btn.disabled = false;
                    showFlash('Gatekeeper Connection Failed.', 'error');
                });
        });
    </script>
</body>

</html>
