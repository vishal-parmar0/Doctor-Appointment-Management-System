<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Schedule - Doctor Panel</title>

    <!-- Tech Stack -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary: #0066FF;
            --secondary: #7C3AED;
            --success: #10B981;
            --grey: #6B7280;
            --light-bg: #F8FAFF;
            --radius-md: 16px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            display: flex;
        }

        /* Sidebar Sidebar */
        .sidebar {
            width: 280px;
            background: white;
            height: 100vh;
            position: fixed;
            padding: 30px 20px;
            box-shadow: 2px 0 20px rgba(0, 0, 0, 0.03);
            z-index: 1000;
        }

        .sidebar-brand {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .menu-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--grey);
            font-weight: 500;
            transition: 0.2s;
            margin-bottom: 5px;
        }

        .menu-link.active {
            background: var(--primary);
            color: white;
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            width: calc(100% - 280px);
            padding: 40px;
            min-height: 100vh;
        }

        /* Top Header */
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        @media (max-width: 992px) {
            .sidebar {
                width: 80px;
                padding: 20px 10px;
            }

            .sidebar-brand span,
            .menu-link span {
                display: none;
            }

            .main-content {
                margin-left: 80px;
                width: calc(100% - 80px);
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <a href="doctor-dashboard.html" class="sidebar-brand">
            <i class="fa-solid fa-square-plus"></i> <span>MediBook</span>
        </a>

        <ul class="sidebar-menu" style="list-style: none; padding: 0; flex: 1;">
            <li class="menu-item">
                <a href="doctor-dashboard.html" class="menu-link">
                    <i class="fa-solid fa-house"></i> <span>Dashboard</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="doctor-appointments.html" class="menu-link active">
                    <i class="fa-solid fa-calendar"></i> <span>Appointments</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="doctor-patients.html" class="menu-link">
                    <i class="fa-solid fa-user-group"></i> <span>My Patients</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="doctor-settings.html" class="menu-link">
                    <i class="fa-solid fa-gear"></i> <span>Settings</span>
                </a>
            </li>
        </ul>

        <div class="sidebar-footer" style="border-top: 1px solid #eee; padding-top: 20px;">
            <a href="#" onclick="logout(); return false;" class="menu-link text-danger">
                <i class="fa-solid fa-right-from-bracket"></i> <span>Sign Out</span>
            </a>
        </div>
    </aside>

    <main class="main-content">
        <header class="header-top" data-aos="fade-down">
            <div>
                <h2 class="fw-bold mb-1">Manage Schedule</h2>
                <div class="month-name small text-muted" id="currentDateDisplay">Today, March 28, 2026</div>
            </div>

            <div class="d-flex align-items-center gap-3">
                <div class="btn-group">
                    <button class="btn btn-outline-light border text-dark" id="prevDay"><i
                            class="fa-solid fa-chevron-left"></i></button>
                    <button class="btn btn-outline-light border text-dark" id="nextDay"><i
                            class="fa-solid fa-chevron-right"></i></button>
                </div>
                <div id="shared-navbar-right"></div>
            </div>
        </header>

        <div class="calendar-card" data-aos="fade-up">
            <div class="time-slot-list" id="appointmentsContainer">
                <!-- Dynamic content loaded via JS -->
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // 🛡️ AUTH CHECK
        const API_URL = 'http://127.0.0.1:5000/api';
        const token = sessionStorage.getItem('token');
        const userStr = sessionStorage.getItem('user');
        const user = userStr ? JSON.parse(userStr) : null;

        if (!token || !user || user.role !== 'doctor') {
            window.location.href = 'login.html';
        }

        AOS.init({ duration: 800 });

        let currentViewDate = new Date('2026-03-28');

        document.getElementById('prevDay').onclick = () => {
            currentViewDate.setDate(currentViewDate.getDate() - 1);
            updateDateDisplay();
            fetchSchedule();
        };

        document.getElementById('nextDay').onclick = () => {
            currentViewDate.setDate(currentViewDate.getDate() + 1);
            updateDateDisplay();
            fetchSchedule();
        };

        function updateDateDisplay() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDateDisplay').innerText = 
                currentViewDate.toDateString() === new Date().toDateString() ? 
                `Today, ${currentViewDate.toLocaleDateString(undefined, options)}` : 
                currentViewDate.toLocaleDateString(undefined, options);
        }

        async function fetchSchedule() {
            try {
                const response = await fetch(`${API_URL}/doctor/appointments/doctor`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                const container = document.getElementById('appointmentsContainer');
                container.innerHTML = '';

                // Filter by chosen date
                const targetDateStr = currentViewDate.toISOString().split('T')[0];
                const filtered = data.filter(ap => ap.date === targetDateStr);

                if (filtered.length === 0) {
                    container.innerHTML = `
                        <div class="p-5 text-center">
                            <i class="fa-regular fa-calendar-xmark fa-3x text-muted mb-3"></i>
                            <p class="text-muted">No appointments found for this day.</p>
                        </div>`;
                    return;
                }

                filtered.sort((a, b) => a.time.localeCompare(b.time)).forEach(ap => {
                    const isVideo = ap.type.toLowerCase().includes('video');
                    const typeClass = isVideo ? 'type-video' : 'type-offline';
                    const typeIcon = isVideo ? 'fa-video' : 'fa-hand-holding-medical';
                    const avatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(ap.patient_name)}&background=random`;

                    let statusStyles = {
                        confirmed: { bg: 'rgba(16, 185, 129, 0.05)', border: 'var(--success)' },
                        pending: { bg: 'rgba(0, 102, 255, 0.05)', border: 'var(--primary)' },
                        in_consultation: { bg: 'rgba(124, 58, 237, 0.05)', border: 'var(--secondary)' },
                        cancelled: { bg: 'rgba(107, 114, 128, 0.05)', border: 'var(--grey)' }
                    };

                    const style = statusStyles[ap.status] || { bg: 'white', border: '#F3F4F6' };

                    const div = document.createElement('div');
                    div.className = 'time-slot';
                    div.style.background = style.bg;
                    div.style.borderColor = style.border;
                    div.innerHTML = `
                        <div class="time-label">${ap.time}</div>
                        <div class="booking-info">
                            <img src="${avatar}" class="p-avatar">
                            <div>
                                <p class="p-name">${ap.patient_name}</p>
                                <span class="badge-type ${typeClass}"><i class="fa-solid ${typeIcon} me-1"></i> ${ap.type}</span>
                                <span class="badge rounded-pill bg-light text-dark small border ms-2">${ap.status}</span>
                            </div>
                        </div>
                        <div class="btn-panel-sm">
                            ${ap.status === 'pending' ? `
                                <button class="btn-circle btn-primary-light text-success" onclick="updateAppointment(${ap.id}, 'accept')" title="Accept"><i class="fa-solid fa-check"></i></button>
                                <button class="btn-circle btn-primary-light text-danger" onclick="updateAppointment(${ap.id}, 'reject')" title="Reject"><i class="fa-solid fa-times"></i></button>
                            ` : ''}
                            ${ap.status === 'confirmed' ? `
                                <button class="btn-circle btn-primary-light" onclick="updateAppointment(${ap.id}, 'start')" title="Start Consult"><i class="fa-solid fa-play"></i></button>
                            ` : ''}
                            <button class="btn-circle btn-primary-light" onclick="window.location.href='doctor-patients.html'" title="View History"><i class="fa-solid fa-file-medical"></i></button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch (err) {
                console.error('Error fetching schedule:', err);
            }
        }

        async function updateAppointment(id, action) {
            try {
                const res = await fetch(`${API_URL}/doctor/appointments/${action}/${id}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    fetchSchedule();
                } else {
                    const error = await res.json();
                    alert(error.error || "Failed to update appointment");
                }
            } catch (err) {
                alert("Server error connecting to MediBook.");
            }
        }

        updateDateDisplay();
        fetchSchedule();
    </script>
    <script src="shared_navbar.js"></script>
</body>

</html>
